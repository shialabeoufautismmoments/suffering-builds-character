backend:
  name: git-gateway
  branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "roster"
    label: "Roster"
    files:
      - file: "data/players.json"
        label: "Players"
        name: "players"
        fields:
          - label: "Players"
            name: "players"
            widget: "list"
            summary: "{{fields.name}} — {{fields.rank}}"
            fields:
              - { label: "ID (URL slug — lowercase, no spaces)", name: "id", widget: "string" }
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Game", name: "game", widget: "string" }
              - { label: "Role", name: "role", widget: "string" }
              - { label: "Rank", name: "rank", widget: "string" }
              - { label: "Country Code", name: "country", widget: "string", required: false, hint: "2-letter ISO code (e.g. US, GB, KR, BR) — shows a flag next to the name. Leave blank for no flag." }
              - { label: "Staff Member?", name: "isStaff", widget: "boolean", default: false, hint: "Check to include this player on the Staff page." }
              - { label: "Joined", name: "joined", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD" }
              - { label: "Accent Color", name: "accent", widget: "color" }
              - { label: "Photo", name: "photo", widget: "image", required: false, hint: "Optional. Falls back to initials avatar if left blank." }
              - { label: "Bio", name: "bio", widget: "text" }
              - { label: "Achievements", name: "achievements", widget: "text", required: false, hint: "One achievement per line." }
              - { label: "YouTube Videos", name: "youtubeVideos", widget: "text", required: false, hint: "One YouTube video URL per line (highlights, VODs, etc). Leave blank for none." }
              - label: "Socials"
                name: "socials"
                widget: "object"
                fields:
                  - { label: "Twitch URL", name: "twitch", widget: "string", required: false }
                  - { label: "Twitter URL", name: "twitter", widget: "string", required: false }
                  - { label: "Pyvno URL", name: "pyvno", widget: "string", required: false, hint: "e.g. https://pyvno.xyz/username" }

  - name: "news"
    label: "News"
    files:
      - file: "data/news.json"
        label: "Announcements"
        name: "news"
        fields:
          - label: "Announcements"
            name: "news"
            widget: "list"
            summary: "{{fields.date}} — {{fields.title}}"
            fields:
              - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Body", name: "body", widget: "text" }

  - name: "about"
    label: "About"
    files:
      - file: "data/about.json"
        label: "About Page"
        name: "about"
        fields:
          - { label: "Founded", name: "founded", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD" }
          - { label: "Story", name: "story", widget: "text" }

  - name: "partners"
    label: "Partners"
    files:
      - file: "data/partners.json"
        label: "Partners"
        name: "partners"
        fields:
          - label: "Partners"
            name: "partners"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Logo", name: "logo", widget: "image", required: false, hint: "Optional. Falls back to a text card with the partner's name if left blank." }
              - { label: "Website URL", name: "url", widget: "string", required: false, hint: "Optional. Makes the card clickable, opening in a new tab. Leave blank for a non-clickable card." }
              - { label: "Description", name: "description", widget: "text", required: false, hint: "Optional short blurb about the partnership." }
              - { label: "Enabled", name: "enabled", widget: "boolean", default: true, hint: "Uncheck to hide this partner without deleting it." }

  - name: "roadmap"
    label: "Roadmap"
    files:
      - file: "data/roadmap.json"
        label: "Roadmap"
        name: "roadmap"
        fields:
          - label: "Roadmap Items"
            name: "items"
            widget: "list"
            summary: "{{fields.title}} — {{fields.status}}"
            hint: "Drag items to reorder. Order here is the order shown on the page."
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Target (optional)", name: "target", widget: "string", required: false, hint: "e.g. Q3 2026, Late 2026, TBD" }
              - label: "Status"
                name: "status"
                widget: "select"
                options: ["Planned", "In Progress", "Completed"]
                default: "Planned"
              - { label: "Description", name: "description", widget: "text", required: false }

  - name: "wiki"
    label: "Wiki"
    files:
      - file: "data/wiki.json"
        label: "Entries"
        name: "wiki"
        fields:
          - label: "Entries"
            name: "entries"
            widget: "list"
            summary: "{{fields.title}}"
            hint: "Each entry gets its own page at wiki-entry.html?slug=... and shows up in the wiki index."
            fields:
              - { label: "Slug", name: "slug", widget: "string", hint: "URL-safe, lowercase, no spaces (e.g. map-callouts)" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Category", name: "category", widget: "string", required: false, hint: "e.g. Movement, Aim Training, Game Sense. Type the exact same name on other entries to group them together — the Wiki page builds its filter tabs from whatever category names are actually in use, so there's nothing else to set up. Leave blank to leave this entry uncategorized." }
              - { label: "Summary", name: "summary", widget: "string", required: false, hint: "Short teaser shown on the wiki index page." }
              - { label: "Body", name: "body", widget: "markdown", hint: "Full markdown editor — headings, bold/italic, links, lists, quotes, code all supported." }
              - { label: "PDF Attachment", name: "pdf", widget: "file", required: false, hint: "Optional. Upload a PDF to embed below the body, with a download link." }
              - { label: "Enabled", name: "enabled", widget: "boolean", default: true, hint: "Uncheck to hide this entry without deleting it." }

  - name: "vod_reviews"
    label: "VOD Reviews"
    files:
      - file: "data/vod-reviews.json"
        label: "Reviews"
        name: "vod_reviews"
        fields:
          - label: "Reviews"
            name: "reviews"
            widget: "list"
            summary: "{{fields.title}}"
            hint: "Public VOD review write-ups. Paste a Google Doc link — make sure the doc's sharing setting is \"Anyone with the link can view\", or visitors won't be able to open it."
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Player / Team Reviewed", name: "subject", widget: "string", required: false }
              - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD", required: false }
              - { label: "Summary", name: "summary", widget: "text", required: false, hint: "Short teaser shown on the list before visitors click through." }
              - { label: "Google Doc Link", name: "docUrl", widget: "string", hint: "Paste the doc's share link. Set sharing to \"Anyone with the link can view\" first." }
              - { label: "Enabled", name: "enabled", widget: "boolean", default: true, hint: "Uncheck to hide this review without deleting it." }

  - name: "threads"
    label: "Twitter Threads"
    files:
      - file: "data/threads.json"
        label: "Threads"
        name: "threads"
        fields:
          - label: "Threads"
            name: "threads"
            widget: "list"
            summary: "{{fields.title}}"
            hint: "No Twitter account/API needed — just paste each tweet's URL from the thread, in order, and it renders as an official embedded tweet, stacked to look unrolled."
            fields:
              - { label: "Slug", name: "slug", widget: "string", hint: "URL-safe, lowercase, no spaces (e.g. my-big-thread)" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Tweet URLs (one per line, in order)", name: "tweetUrls", widget: "text", hint: "Paste each tweet's URL from the thread on its own line, top to bottom, in the order they should appear." }
              - { label: "Enabled", name: "enabled", widget: "boolean", default: true, hint: "Uncheck to hide this thread without deleting it." }

  - name: "custom_pages"
    label: "Custom Pages"
    files:
      - file: "data/pages.json"
        label: "Pages"
        name: "pages"
        fields:
          - label: "Pages"
            name: "pages"
            widget: "list"
            summary: "{{fields.label}}"
            hint: "Add a page here and it shows up in the nav automatically. Remove one and it disappears from the nav and the URL stops working — that's how you delete a page."
            fields:
              - { label: "Slug", name: "slug", widget: "string", hint: "URL-safe, lowercase, no spaces (e.g. sponsors). Page will live at page.html?slug=sponsors" }
              - { label: "Nav Label", name: "label", widget: "string", hint: "Text shown in the nav bar." }
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Body", name: "body", widget: "text", hint: "Separate paragraphs with a blank line." }
              - { label: "PDF Attachment", name: "pdf", widget: "file", required: false, hint: "Optional. Upload a PDF to embed below the body, with a download link." }
              - { label: "Enabled", name: "enabled", widget: "boolean", default: true, hint: "Uncheck to hide this page without deleting it." }

  - name: "testimonials"
    label: "Coaching / Testimonials"
    files:
      - file: "data/testimonials.json"
        label: "Testimonials"
        name: "testimonials"
        fields:
          - label: "Coaches"
            name: "coaches"
            widget: "list"
            summary: "{{fields.playerId}}"
            hint: "Feature a roster member as a bookable coach. The card shows their photo/name/flag pulled straight from Roster, plus the coaching-specific description you write here (separate from their roster bio) — clicking the card opens their Cal.com link."
            fields:
              - { label: "Player ID", name: "playerId", widget: "string", hint: "Must exactly match that player's \"ID (URL slug)\" field in Roster — e.g. psev, eoo, cannon." }
              - { label: "Coaching Description", name: "description", widget: "text", hint: "What this coach focuses on — distinct from their roster bio." }
              - { label: "Pricing", name: "pricing", widget: "text", required: false, hint: "One price per line, e.g. \"$30 / 30 min\" then \"$50 / 60 min\" on the next line. Shown under the description. Leave blank to hide pricing on this card." }
              - { label: "Cal.com Booking URL", name: "calLink", widget: "string", hint: "e.g. https://cal.com/psev/coaching-session" }
              - { label: "Enabled", name: "enabled", widget: "boolean", default: true, hint: "Uncheck to hide this coach listing without deleting it." }
          - { label: "Packages Intro", name: "packagesIntro", widget: "text", required: false, hint: "Optional short blurb shown above the Individual Coaching Packages grid." }
          - { label: "Packages Contact Label", name: "packagesContactLabel", widget: "string", required: false, default: "Contact us for a custom quote", hint: "Fallback button text for any package without its own CTA link below." }
          - { label: "Packages Contact URL", name: "packagesContactUrl", widget: "string", required: false, hint: "Fallback link (Discord, mailto:, a form) for any package without its own CTA link below." }
          - label: "Individual Coaching Packages"
            name: "packages"
            widget: "list"
            summary: "{{fields.name}}"
            hint: "Pricing tiers for one player's own 1-on-1 coaching (e.g. a 5-session pack or a monthly plan) — separate from the per-coach Pricing field above and from the Team Coaching page's org packages."
            fields:
              - { label: "Name", name: "name", widget: "string", hint: "e.g. Single Session, 5-Session Pack, Monthly Unlimited" }
              - { label: "Price", name: "price", widget: "string", hint: "e.g. $30, $135 (5 sessions), $400/mo" }
              - { label: "Tagline", name: "tagline", widget: "string", required: false, hint: "Optional one-line pitch shown under the price." }
              - { label: "Features", name: "features", widget: "text", required: false, hint: "One per line — shown as a checklist, e.g. \"1 VOD review\" then \"Discord Q&A access\" on the next line." }
              - { label: "Featured?", name: "featured", widget: "boolean", default: false, hint: "Highlights this tier as the recommended option." }
              - { label: "CTA Label", name: "ctaLabel", widget: "string", required: false, hint: "Leave blank to use the Packages Contact Label above." }
              - { label: "CTA URL", name: "ctaUrl", widget: "string", required: false, hint: "Leave blank to use the Packages Contact URL above — e.g. link straight to a coach's Cal.com page for this specific package." }
              - { label: "Enabled", name: "enabled", widget: "boolean", default: true, hint: "Uncheck to hide this package without deleting it." }
          - label: "Testimonials"
            name: "testimonials"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Role / Context", name: "role", widget: "string", required: false, hint: "e.g. Diamond → Masters in 3 months of coaching" }
              - { label: "Quote", name: "quote", widget: "text" }
              - label: "Rating"
                name: "rating"
                widget: "select"
                options: ["5", "4", "3", "2", "1"]
                default: "5"
                required: false
              - { label: "PDF Attachment", name: "pdf", widget: "file", required: false, hint: "Optional. e.g. a written coaching session report." }
              - { label: "Enabled", name: "enabled", widget: "boolean", default: true, hint: "Uncheck to hide this testimonial without deleting it." }

  - name: "spotlights"
    label: "Player Spotlights"
    files:
      - file: "data/spotlights.json"
        label: "Spotlights"
        name: "spotlights"
        fields:
          - label: "Spotlights"
            name: "spotlights"
            widget: "list"
            summary: "{{fields.playerName}}"
            hint: "A public case study for one player: what coaching work was done, before/after screenshots, and notes. Each gets its own page at player-spotlight.html?slug=... and is listed on the Player Spotlights index. This is public — get the player's OK before posting their name, screenshots, or progress."
            fields:
              - { label: "Slug", name: "slug", widget: "string", hint: "URL-safe, lowercase, no spaces (e.g. peanut-aim-arc)" }
              - { label: "Player Name", name: "playerName", widget: "string" }
              - { label: "Photo", name: "photo", widget: "image", required: false, hint: "Optional portrait/avatar. Falls back to initials if left blank." }
              - { label: "Summary", name: "summary", widget: "string", required: false, hint: "Short teaser shown on the index page (e.g. \"Diamond 2 to Masters in 6 weeks\")." }
              - { label: "Notes", name: "notes", widget: "markdown", hint: "The write-up: what was worked on, progress over time, etc. Full markdown editor — use the image button in the toolbar to embed before/after screenshots directly in the text, right where they're relevant." }
              - { label: "Document", name: "document", widget: "file", required: false, hint: "Optional. Upload one PDF (a written report, a training plan, etc.) to embed below the notes, with a download link. For more documents, just link them from within the Notes text instead." }
              - { label: "Enabled", name: "enabled", widget: "boolean", default: true, hint: "Uncheck to hide this spotlight without deleting it." }

  - name: "team_coaching"
    label: "Team Coaching"
    files:
      - file: "data/team-coaching.json"
        label: "Team Coaching"
        name: "team_coaching"
        fields:
          - { label: "Tagline", name: "tagline", widget: "string", required: false, hint: "Short pitch shown under the page heading, e.g. \"Get your whole roster coached together.\"" }
          - { label: "Contact Button Label", name: "contactLabel", widget: "string", required: false, hint: "Default: \"Contact us for a custom quote\". Shown at the top of the page and as the fallback button on any package that doesn't have its own CTA link." }
          - { label: "Contact Button URL", name: "contactUrl", widget: "string", required: false, hint: "Where the general contact button links — Discord, email (mailto:you@example.com), a form, etc." }
          - label: "Packages"
            name: "packages"
            widget: "list"
            summary: "{{fields.name}}"
            hint: "One pricing tier per entry, shown as a card on the Team Coaching page."
            fields:
              - { label: "Package Name", name: "name", widget: "string", hint: "e.g. Starter, Pro, Elite" }
              - { label: "Price", name: "price", widget: "string", hint: "e.g. \"$500/mo\" or \"Custom pricing\"" }
              - { label: "Tagline", name: "tagline", widget: "string", required: false, hint: "Short one-line pitch for this package." }
              - { label: "Features", name: "features", widget: "text", required: false, hint: "One feature per line — shown as a checklist on the card." }
              - { label: "Featured?", name: "featured", widget: "boolean", default: false, hint: "Visually highlights this package as the recommended tier." }
              - { label: "CTA Label", name: "ctaLabel", widget: "string", required: false, hint: "Defaults to the page's Contact Button Label if left blank." }
              - { label: "CTA URL", name: "ctaUrl", widget: "string", required: false, hint: "Booking link, Discord, contact form, etc. Leave blank to fall back to the page's Contact Button URL above." }
              - { label: "Enabled", name: "enabled", widget: "boolean", default: true, hint: "Uncheck to hide this package without deleting it." }

  - name: "reading"
    label: "Reading"
    files:
      - file: "data/books.json"
        label: "Books"
        name: "books"
        fields:
          - label: "Books"
            name: "books"
            widget: "list"
            summary: "{{fields.title}}"
            hint: "Each book gets its own Notes page (linked from its card) and a region-aware Amazon buy button."
            fields:
              - { label: "Slug", name: "slug", widget: "string", hint: "URL-safe, lowercase, no spaces (e.g. atomic-habits). Notes page will live at notes.html?slug=atomic-habits" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Author", name: "author", widget: "string", required: false }
              - { label: "Cover Image", name: "cover", widget: "image", required: false, hint: "Falls back to a plain placeholder if left blank." }
              - { label: "Amazon Link", name: "amazonUrl", widget: "string", required: false, hint: "Paste any Amazon product link, any country domain (e.g. a .com or .co.uk link) — visitors are redirected to their own region's Amazon store based on their browser's language setting when they click Buy. This is a heuristic, not true location detection, so it won't be 100% accurate for every visitor." }
              - { label: "Summary", name: "summary", widget: "text", required: false }
              - { label: "Notes", name: "notes", widget: "text", required: false, hint: "Shown on this book's own Notes page. Separate paragraphs with a blank line. Leave blank to hide the Notes link on the card." }
              - { label: "Enabled", name: "enabled", widget: "boolean", default: true, hint: "Uncheck to hide this book without deleting it." }

  - name: "settings"
    label: "Site Settings"
    files:
      - file: "data/site.json"
        label: "Global Settings"
        name: "site"
        fields:
          - { label: "Site Name", name: "siteName", widget: "string" }
          - { label: "Tagline", name: "tagline", widget: "string" }
          - { label: "Custom Logo", name: "logo", widget: "image", required: false, hint: "Optional. Leave blank to keep the default mascot logo." }
          - { label: "Primary Accent Color", name: "accentColor", widget: "color" }
          - { label: "Glow/Highlight Accent Color", name: "accentBright", widget: "color" }
          - { label: "Footer Note", name: "footerText", widget: "string", required: false, hint: "Optional extra line shown in the footer." }
          - { label: "Discord Server ID", name: "discordServerId", widget: "string", required: false, hint: "Shows a live Discord widget (member count, who's online) in the footer of every page. To find it: your Discord server → Server Settings → Widget → turn on \"Enable Server Widget\" → copy the Server ID shown there. Leave blank to hide the widget." }
          - label: "Navigation Menu"
            name: "navigation"
            widget: "list"
            summary: "{{fields.label}}"
            hint: "Controls the nav bar: order, labels, visibility, AND grouping into hover dropdowns (see Parent Group(s) below). The 15 built-in entries (home/roster/news/staff/about/partners/wiki/vod-reviews/threads/roadmap/coaching/spotlights/team-coaching/reading/information) must keep their exact ID and Path unchanged or their Enabled toggle stops working correctly — but you can reorder them, relabel them, or uncheck Enabled to take that whole section offline (not just hide the menu link). You can also add a brand-new entry for an external link (e.g. Discord) — give it any unique ID and put the full URL in Path."
            fields:
              - { label: "ID", name: "id", widget: "string", hint: "Built-ins: home / roster / news / staff / about / partners / wiki / vod-reviews / threads / roadmap / coaching / spotlights / team-coaching / reading / information. Anything else = a custom link, unrelated to any real page." }
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Path / URL", name: "path", widget: "string", required: false, hint: "Built-ins: index.html / roster.html / news.html / staff.html / about.html / partners.html / wiki.html / vod-reviews.html / threads.html / roadmap.html / coaching.html / player-spotlights.html / team-coaching.html / reading.html. Custom links: any URL. Leave blank for a dropdown-only label with no page of its own (like \"Information\") — it becomes unclickable text that just triggers its dropdown on hover." }
              - { label: "Parent Group(s)", name: "parents", widget: "string", required: false, hint: "Leave blank to show this item as its own top-level nav button. To nest it as a hover-dropdown item instead, put the ID(s) of the top-level item(s) it should appear under, comma-separated if more than one (e.g. \"home\" or \"home,about\"). An item with children automatically gets a hover dropdown; hovering an item with no children does nothing." }
              - { label: "Enabled", name: "enabled", widget: "boolean", default: true }
          - label: "Social / Contact Links"
            name: "socials"
            widget: "list"
            required: false
            summary: "{{fields.label}}"
            fields:
              - { label: "Label", name: "label", widget: "string", hint: "e.g. Discord" }
              - { label: "URL", name: "url", widget: "string" }
          - label: "Page Headings & Intros"
            name: "pages"
            widget: "object"
            fields:
              - label: "Home Page"
                name: "home"
                widget: "object"
                fields:
                  - { label: "Heading", name: "heading", widget: "string" }
                  - { label: "Intro text", name: "intro", widget: "text", required: false, hint: "Shown as the hero welcome text on the homepage." }
              - label: "Roster Page"
                name: "roster"
                widget: "object"
                fields:
                  - { label: "Heading", name: "heading", widget: "string" }
                  - { label: "Intro text", name: "intro", widget: "text", required: false }
              - label: "News Page"
                name: "news"
                widget: "object"
                fields:
                  - { label: "Heading", name: "heading", widget: "string" }
                  - { label: "Intro text", name: "intro", widget: "text", required: false }
              - label: "Staff Page"
                name: "staff"
                widget: "object"
                fields:
                  - { label: "Heading", name: "heading", widget: "string" }
                  - { label: "Intro text", name: "intro", widget: "text", required: false }
              - label: "About Page"
                name: "about"
                widget: "object"
                fields:
                  - { label: "Heading", name: "heading", widget: "string" }
                  - { label: "Intro text", name: "intro", widget: "text", required: false }
              - label: "Partners Page"
                name: "partners"
                widget: "object"
                fields:
                  - { label: "Heading", name: "heading", widget: "string" }
                  - { label: "Intro text", name: "intro", widget: "text", required: false }
              - label: "Wiki Page"
                name: "wiki"
                widget: "object"
                fields:
                  - { label: "Heading", name: "heading", widget: "string" }
                  - { label: "Intro text", name: "intro", widget: "text", required: false }
              - label: "Threads Page"
                name: "threads"
                widget: "object"
                fields:
                  - { label: "Heading", name: "heading", widget: "string" }
                  - { label: "Intro text", name: "intro", widget: "text", required: false }
              - label: "Roadmap Page"
                name: "roadmap"
                widget: "object"
                fields:
                  - { label: "Heading", name: "heading", widget: "string" }
                  - { label: "Intro text", name: "intro", widget: "text", required: false }
              - label: "Coaching Page"
                name: "coaching"
                widget: "object"
                fields:
                  - { label: "Heading", name: "heading", widget: "string" }
                  - { label: "Intro text", name: "intro", widget: "text", required: false }
              - label: "Player Spotlights Page"
                name: "spotlights"
                widget: "object"
                fields:
                  - { label: "Heading", name: "heading", widget: "string" }
                  - { label: "Intro text", name: "intro", widget: "text", required: false }
              - label: "Reading Page"
                name: "reading"
                widget: "object"
                fields:
                  - { label: "Heading", name: "heading", widget: "string" }
