backend:
  name: git-gateway
  branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "roster"
    label: "Roster"
    files:
      - file: "data/players.json"
        label: "Players"
        name: "players"
        fields:
          - label: "Players"
            name: "players"
            widget: "list"
            summary: "{{fields.name}} — {{fields.rank}}"
            fields:
              - { label: "ID (URL slug — lowercase, no spaces)", name: "id", widget: "string" }
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Game", name: "game", widget: "string" }
              - { label: "Role", name: "role", widget: "string" }
              - { label: "Rank", name: "rank", widget: "string" }
              - { label: "Country Code", name: "country", widget: "string", required: false, hint: "2-letter ISO code (e.g. US, GB, KR, BR) — shows a flag next to the name. Leave blank for no flag." }
              - { label: "Staff Member?", name: "isStaff", widget: "boolean", default: false, hint: "Check to include this player on the Staff page." }
              - { label: "Joined", name: "joined", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD" }
              - { label: "Accent Color", name: "accent", widget: "color" }
              - { label: "Photo", name: "photo", widget: "image", required: false, hint: "Optional. Falls back to initials avatar if left blank." }
              - { label: "Bio", name: "bio", widget: "text" }
              - { label: "Achievements", name: "achievements", widget: "text", required: false, hint: "One achievement per line." }
              - { label: "YouTube Videos", name: "youtubeVideos", widget: "text", required: false, hint: "One YouTube video URL per line (highlights, VODs, etc). Leave blank for none." }
              - label: "Socials"
                name: "socials"
                widget: "object"
                fields:
                  - { label: "Twitch URL", name: "twitch", widget: "string", required: false }
                  - { label: "Twitter URL", name: "twitter", widget: "string", required: false }
                  - { label: "Pyvno URL", name: "pyvno", widget: "string", required: false, hint: "e.g. https://pyvno.xyz/username" }

  - name: "news"
    label: "News"
    files:
      - file: "data/news.json"
        label: "Announcements"
        name: "news"
        fields:
          - label: "Announcements"
            name: "news"
            widget: "list"
            summary: "{{fields.date}} — {{fields.title}}"
            fields:
              - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Body", name: "body", widget: "text" }

  - name: "schedule"
    label: "Schedule"
    files:
      - file: "data/schedule.json"
        label: "Events"
        name: "schedule"
        fields:
          - label: "Events"
            name: "events"
            widget: "list"
            summary: "{{fields.date}} — {{fields.title}}"
            fields:
              - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD" }
              - { label: "Time", name: "time", widget: "string", required: false, hint: "e.g. 7:00 PM ET" }
              - { label: "Title", name: "title", widget: "string", hint: "e.g. Scrim vs Rival Clan" }
              - { label: "Game", name: "game", widget: "string", required: false }
              - { label: "Notes", name: "notes", widget: "text", required: false }
              - { label: "Link", name: "link", widget: "string", required: false, hint: "Stream/bracket link, optional" }

  - name: "about"
    label: "About"
    files:
      - file: "data/about.json"
        label: "About Page"
        name: "about"
        fields:
          - { label: "Founded", name: "founded", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD" }
          - { label: "Story", name: "story", widget: "text" }

  - name: "roadmap"
    label: "Roadmap"
    files:
      - file: "data/roadmap.json"
        label: "Roadmap"
        name: "roadmap"
        fields:
          - label: "Roadmap Items"
            name: "items"
            widget: "list"
            summary: "{{fields.title}} — {{fields.status}}"
            hint: "Drag items to reorder. Order here is the order shown on the page."
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Target (optional)", name: "target", widget: "string", required: false, hint: "e.g. Q3 2026, Late 2026, TBD" }
              - label: "Status"
                name: "status"
                widget: "select"
                options: ["Planned", "In Progress", "Completed"]
                default: "Planned"
              - { label: "Description", name: "description", widget: "text", required: false }

  - name: "wiki"
    label: "Wiki"
    files:
      - file: "data/wiki.json"
        label: "Entries"
        name: "wiki"
        fields:
          - label: "Entries"
            name: "entries"
            widget: "list"
            summary: "{{fields.title}}"
            hint: "Each entry gets its own page at wiki-entry.html?slug=... and shows up in the wiki index."
            fields:
              - { label: "Slug", name: "slug", widget: "string", hint: "URL-safe, lowercase, no spaces (e.g. map-callouts)" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Summary", name: "summary", widget: "string", required: false, hint: "Short teaser shown on the wiki index page." }
              - { label: "Body", name: "body", widget: "text", hint: "Separate paragraphs with a blank line." }
              - { label: "PDF Attachment", name: "pdf", widget: "file", required: false, hint: "Optional. Upload a PDF to embed below the body, with a download link." }
              - { label: "Enabled", name: "enabled", widget: "boolean", default: true, hint: "Uncheck to hide this entry without deleting it." }

  - name: "threads"
    label: "Twitter Threads"
    files:
      - file: "data/threads.json"
        label: "Threads"
        name: "threads"
        fields:
          - label: "Threads"
            name: "threads"
            widget: "list"
            summary: "{{fields.title}}"
            hint: "No Twitter account/API needed — just paste each tweet's URL from the thread, in order, and it renders as an official embedded tweet, stacked to look unrolled."
            fields:
              - { label: "Slug", name: "slug", widget: "string", hint: "URL-safe, lowercase, no spaces (e.g. my-big-thread)" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Tweet URLs (one per line, in order)", name: "tweetUrls", widget: "text", hint: "Paste each tweet's URL from the thread on its own line, top to bottom, in the order they should appear." }
              - { label: "Enabled", name: "enabled", widget: "boolean", default: true, hint: "Uncheck to hide this thread without deleting it." }

  - name: "custom_pages"
    label: "Custom Pages"
    files:
      - file: "data/pages.json"
        label: "Pages"
        name: "pages"
        fields:
          - label: "Pages"
            name: "pages"
            widget: "list"
            summary: "{{fields.label}}"
            hint: "Add a page here and it shows up in the nav automatically. Remove one and it disappears from the nav and the URL stops working — that's how you delete a page."
            fields:
              - { label: "Slug", name: "slug", widget: "string", hint: "URL-safe, lowercase, no spaces (e.g. sponsors). Page will live at page.html?slug=sponsors" }
              - { label: "Nav Label", name: "label", widget: "string", hint: "Text shown in the nav bar." }
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Body", name: "body", widget: "text", hint: "Separate paragraphs with a blank line." }
              - { label: "PDF Attachment", name: "pdf", widget: "file", required: false, hint: "Optional. Upload a PDF to embed below the body, with a download link." }
              - { label: "Enabled", name: "enabled", widget: "boolean", default: true, hint: "Uncheck to hide this page without deleting it." }

  - name: "testimonials"
    label: "Coaching / Testimonials"
    files:
      - file: "data/testimonials.json"
        label: "Testimonials"
        name: "testimonials"
        fields:
          - label: "Testimonials"
            name: "testimonials"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Role / Context", name: "role", widget: "string", required: false, hint: "e.g. Diamond → Masters in 3 months of coaching" }
              - { label: "Quote", name: "quote", widget: "text" }
              - label: "Rating"
                name: "rating"
                widget: "select"
                options: ["5", "4", "3", "2", "1"]
                default: "5"
                required: false
              - { label: "PDF Attachment", name: "pdf", widget: "file", required: false, hint: "Optional. e.g. a written coaching session report." }
              - { label: "Enabled", name: "enabled", widget: "boolean", default: true, hint: "Uncheck to hide this testimonial without deleting it." }

  - name: "settings"
    label: "Site Settings"
    files:
      - file: "data/site.json"
        label: "Global Settings"
        name: "site"
        fields:
          - { label: "Site Name", name: "siteName", widget: "string" }
          - { label: "Tagline", name: "tagline", widget: "string" }
          - { label: "Custom Logo", name: "logo", widget: "image", required: false, hint: "Optional. Leave blank to keep the default mascot logo." }
          - { label: "Primary Accent Color", name: "accentColor", widget: "color" }
          - { label: "Glow/Highlight Accent Color", name: "accentBright", widget: "color" }
          - { label: "Footer Note", name: "footerText", widget: "string", required: false, hint: "Optional extra line shown in the footer." }
          - { label: "Discord Server ID", name: "discordServerId", widget: "string", required: false, hint: "Shows a live Discord widget (member count, who's online) in the footer of every page. To find it: your Discord server → Server Settings → Widget → turn on \"Enable Server Widget\" → copy the Server ID shown there. Leave blank to hide the widget." }
          - label: "Navigation Menu"
            name: "navigation"
            widget: "list"
            summary: "{{fields.label}}"
            hint: "Controls the nav bar: order, labels, visibility. The 10 built-in entries (home/roster/news/schedule/staff/about/wiki/threads/roadmap/coaching) must keep their exact ID and Path unchanged or their Enabled toggle stops working correctly — but you can reorder them, relabel them, or uncheck Enabled to take that whole section offline (not just hide the menu link). You can also add a brand-new entry for an external link (e.g. Discord) — give it any unique ID and put the full URL in Path."
            fields:
              - { label: "ID", name: "id", widget: "string", hint: "Built-ins: home / roster / news / schedule / staff / about / wiki / threads / roadmap / coaching. Anything else = a custom link, unrelated to any real page." }
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Path / URL", name: "path", widget: "string", hint: "Built-ins: index.html / roster.html / news.html / schedule.html / staff.html / about.html / wiki.html / threads.html / roadmap.html / coaching.html. Custom links: any URL." }
              - { label: "Enabled", name: "enabled", widget: "boolean", default: true }
          - label: "Social / Contact Links"
            name: "socials"
            widget: "list"
            required: false
            summary: "{{fields.label}}"
            fields:
              - { label: "Label", name: "label", widget: "string", hint: "e.g. Discord" }
              - { label: "URL", name: "url", widget: "string" }
          - label: "Page Headings & Intros"
            name: "pages"
            widget: "object"
            fields:
              - label: "Home Page"
                name: "home"
                widget: "object"
                fields:
                  - { label: "Heading", name: "heading", widget: "string" }
                  - { label: "Intro text", name: "intro", widget: "text", required: false, hint: "Shown as the hero welcome text on the homepage." }
              - label: "Roster Page"
                name: "roster"
                widget: "object"
                fields:
                  - { label: "Heading", name: "heading", widget: "string" }
                  - { label: "Intro text", name: "intro", widget: "text", required: false }
              - label: "News Page"
                name: "news"
                widget: "object"
                fields:
                  - { label: "Heading", name: "heading", widget: "string" }
                  - { label: "Intro text", name: "intro", widget: "text", required: false }
              - label: "Schedule Page"
                name: "schedule"
                widget: "object"
                fields:
                  - { label: "Heading", name: "heading", widget: "string" }
                  - { label: "Intro text", name: "intro", widget: "text", required: false }
              - label: "Staff Page"
                name: "staff"
                widget: "object"
                fields:
                  - { label: "Heading", name: "heading", widget: "string" }
                  - { label: "Intro text", name: "intro", widget: "text", required: false }
              - label: "About Page"
                name: "about"
                widget: "object"
                fields:
                  - { label: "Heading", name: "heading", widget: "string" }
                  - { label: "Intro text", name: "intro", widget: "text", required: false }
              - label: "Wiki Page"
                name: "wiki"
                widget: "object"
                fields:
                  - { label: "Heading", name: "heading", widget: "string" }
                  - { label: "Intro text", name: "intro", widget: "text", required: false }
              - label: "Threads Page"
                name: "threads"
                widget: "object"
                fields:
                  - { label: "Heading", name: "heading", widget: "string" }
                  - { label: "Intro text", name: "intro", widget: "text", required: false }
              - label: "Roadmap Page"
                name: "roadmap"
                widget: "object"
                fields:
                  - { label: "Heading", name: "heading", widget: "string" }
                  - { label: "Intro text", name: "intro", widget: "text", required: false }
              - label: "Coaching Page"
                name: "coaching"
                widget: "object"
                fields:
                  - { label: "Heading", name: "heading", widget: "string" }
                  - { label: "Intro text", name: "intro", widget: "text", required: false }
